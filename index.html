function timeAgo(ts){ const m=Math.floor((Date.now()-ts)/60000); if(m<1)return"just now"; if(m<60)return`${m}m ago`; return`${Math.floor(m/60)}h ago`; }
function timeLeft(p,e){ const r=e-((Date.now()-p)/60000); if(r<=0)return null; if(r<60)return`${Math.floor(r)}m left`; return`${Math.floor(r/60)}h ${Math.floor(r%60)}m left`; }
function expirePct(p,e){ return Math.min(100,((Date.now()-p)/60000/e)*100); }
function isExpired(d){ return((Date.now()-d.postedAt)/60000)>=d.expiresIn; }

function makeMarkerIcon(drop){
  const size=drop.approachable?36:28;
  const pulse=drop.approachable?`<div style="position:absolute;top:50%;left:50%;width:${size+18}px;height:${size+18}px;border-radius:50%;border:2px solid ${drop.color};transform:translate(-50%,-50%);animation:markerPulse 2.5s ease-out infinite;opacity:0.5;pointer-events:none;"></div>`:'';
  const inner=drop.photo
    ?`<img src="${drop.photo}" style="width:${size}px;height:${size}px;border-radius:50%;object-fit:cover;border:2.5px solid ${drop.color};box-shadow:0 0 ${drop.approachable?18:8}px ${drop.color}99;"/>`
    :`<div style="width:${size}px;height:${size}px;border-radius:50%;background:linear-gradient(135deg,${drop.color}dd,${drop.color}88);border:2.5px solid ${drop.color};display:flex;align-items:center;justify-content:center;font-size:${Math.floor(size*0.48)}px;box-shadow:0 0 ${drop.approachable?18:8}px ${drop.color}99;">${drop.name?drop.name[0]:'?'}</div>`;
  const vbadge=drop.verified?`<div style="position:absolute;bottom:-1px;right:-1px;width:14px;height:14px;background:#34d399;border-radius:50%;border:2px solid #080812;display:flex;align-items:center;justify-content:center;font-size:8px;color:#000;font-weight:700;z-index:3;">✓</div>`:'';
  return L.divIcon({html:`<div style="position:relative;width:${size}px;height:${size}px;">${pulse}${inner}${vbadge}</div>`,className:'',iconSize:[size,size],iconAnchor:[size/2,size/2],popupAnchor:[0,-(size/2+4)]});
}

function MapView({drops,onSelectDrop}){
  const mapRef=useRef(null),lmap=useRef(null),markers=useRef({});
  useEffect(()=>{
    if(lmap.current||!mapRef.current)return;
    lmap.current=L.map(mapRef.current,{center:[20,0],zoom:3,zoomControl:true,minZoom:2});
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',{attribution:'&copy; OpenStreetMap &copy; CARTO',subdomains:'abcd',maxZoom:19}).addTo(lmap.current);
    if(navigator.geolocation){navigator.geolocation.getCurrentPosition(pos=>{lmap.current&&lmap.current.setView([pos.coords.latitude,pos.coords.longitude],13);},()=>{},{enableHighAccuracy:true,timeout:6000});}
    return()=>{if(lmap.current){lmap.current.remove();lmap.current=null;}};
  },[]);
  useEffect(()=>{
    if(!lmap.current)return;
    Object.values(markers.current).forEach(m=>m.remove());
    markers.current={};
    drops.filter(d=>!isExpired(d)).forEach(drop=>{
      if(!drop.lat||!drop.lng)return;
      const m=L.marker([drop.lat,drop.lng],{icon:makeMarkerIcon(drop)});
      const tl=timeLeft(drop.postedAt,drop.expiresIn);
      const ph=drop.photo?`<img src="${drop.photo}" style="width:40px;height:40px;border-radius:50%;object-fit:cover;border:2px solid ${drop.color};flex-shrink:0;"/>`:`<div style="width:40px;height:40px;border-radius:50%;background:${drop.color}44;border:2px solid ${drop.color};display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;">${drop.name?drop.name[0]:'?'}</div>`;
      m.bindPopup(`<div style="min-width:200px;font-family:'DM Sans',sans-serif;"><div style="display:flex;gap:8px;align-items:center;margin-bottom:8px;">${ph}<div><div style="font-family:'Syne',sans-serif;font-size:15px;font-weight:700;">${drop.name}, ${drop.age}</div><div style="font-size:10px;color:${drop.verified?'#34d399':'#888'}">${drop.verified?'✓ Verified':'Unverified'}</div></div></div><div style="font-size:11px;color:#888;margin-bottom:5px;">📍 ${drop.location}</div>${tl?`<div style="font-size:11px;color:#f59e0b;margin-bottom:6px;">⏰ ${tl}</div>`:''}<div style="font-size:12px;color:${drop.approachable?'#34d399':'#f472b6'};margin-bottom:10px;font-weight:600;">${drop.approachable?'✓ Come say hi!':'Not right now'}</div><button id="vb-${drop.id}" style="width:100%;padding:9px;border-radius:10px;border:none;background:linear-gradient(135deg,#f59e0b,#f97316);color:#fff;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;">View Profile →</button></div>`,{maxWidth:250});
      m.on('popupopen',()=>{setTimeout(()=>{const b=document.getElementById(`vb-${drop.id}`);if(b)b.onclick=()=>onSelectDrop(drop);},50);});
      m.addTo(lmap.current);
      markers.current[drop.id]=m;
    });
  },[drops]);
  return <div ref={mapRef} id="map-container"/>;
}

          <div style={{fontFamily:"'Syne',sans-serif",fontSize:14,fontWeight:700,color:"#f59e0b",marginBottom:8}}>⚠️ Safety Disclaimer & Waiver of Liability</div>

          <p style={{marginBottom:10}}>You must be <strong style={{color:"#f0ede8"}}>18 years of age or older</strong> to use DropPin. Anyone found to be under 18 will be permanently removed.</p>
          <div style={{fontFamily:"'Syne',sans-serif",fontSize:12,fontWeight:700,color:"#f0ede8",marginBottom:4}}>6. Zero Tolerance Policy</div>
          <p style={{marginBottom:10}}>Harassment, stalking, or threatening behavior results in an immediate permanent ban. DropPin reserves the right to report illegal activity to law enforcement.</p>
          <div style={{fontFamily:"'Syne',sans-serif",fontSize:12,fontWeight:700,color:"#f0ede8",marginBottom:4}}>7. Waiver of Liability</div>
          <p style={{marginBottom:10}}>TO THE FULLEST EXTENT PERMITTED BY LAW, DROPPPIN AND ITS OPERATORS SHALL NOT BE LIABLE FOR ANY DIRECT, INDIRECT, INCIDENTAL, SPECIAL, CONSEQUENTIAL, OR PUNITIVE DAMAGES ARISING FROM YOUR USE OF THIS APP OR YOUR INTERACTIONS WITH OTHER USERS, INCLUDING BUT NOT LIMITED TO PERSONAL INJURY, PROPERTY DAMAGE, OR EMOTIONAL DISTRESS.</p>
          <div style={{fontFamily:"'Syne',sans-serif",fontSize:12,fontWeight:700,color:"#f0ede8",marginBottom:4}}>8. Safety Tips</div>
          <ul style={{paddingLeft:14,marginBottom:10}}>
            <li style={{marginBottom:4}}>Set a Safety Contact in your Profile before going out</li>

          {!scrolled&&<div style={{textAlign:"center",marginTop:12,fontSize:12,color:"#f59e0b"}}>↓ Scroll to the bottom to continue</div>}
        </div>
        <div style={{padding:"14px 20px 22px",borderTop:"1px solid #1e2040"}}>
          {!scrolled&&<div style={{background:"rgba(245,158,11,0.08)",border:"1px solid rgba(245,158,11,0.2)",borderRadius:10,padding:"8px 12px",marginBottom:12,fontSize:12,color:"#f59e0b",textAlign:"center"}}>Please scroll and read the full disclaimer above</div>}
          {[[c1,setC1,"I am 18 years of age or older."],[c2,setC2,"I understand meeting strangers involves risk and take full personal responsibility for my safety."],[c3,setC3,"I have read and agree to the Safety Disclaimer and Waiver of Liability."]].map(([val,setter,label],i)=>(
            <div key={i} onClick={()=>scrolled&&setter(!val)} style={{display:"flex",gap:10,alignItems:"flex-start",marginBottom:10,cursor:scrolled?"pointer":"default",opacity:scrolled?1:0.4}}>

function App({userProfile,onEditProfile}){
  const [tab,setTab]=useState("Map");
  const [drops,setDrops]=useState(SEED_DROPS);
  const [myDrop,setMyDrop]=useState(null);
  const [selectedDrop,setSelectedDrop]=useState(null);
  const [blockedIds,setBlockedIds]=useState([]);
  const [filterApproachable,setFilterApproachable]=useState(false);
  const [filterGender,setFilterGender]=useState("All");
  const [tickTimer,setTickTimer]=useState(0);
  const [form,setForm]=useState({location:"",neighborhood:"City Center",outfit:"",approachable:true,vibe:"",lookingFor:"",lat:null,lng:null,expiresIn:120});
  const [submitted,setSubmitted]=useState(false);
  const [sendMsg,setSendMsg]=useState("");
  const [messages,setMessages]=useState({});
  const [locating,setLocating]=useState(false);
  const [locError,setLocError]=useState("");
  const [showVerify,setShowVerify]=useState(false);
  const [isVerified,setIsVerified]=useState(false);
  const [pendingDrop,setPendingDrop]=useState(false);
  const [showReport,setShowReport]=useState(false);
  const [showSOS,setShowSOS]=useState(false);
  const [sosContact,setSosContact]=useState(store.get('sos_contact')||"");
  const [sosInput,setSosInput]=useState("");

  useEffect(()=>{const t=setInterval(()=>{setTickTimer(n=>n+1);setDrops(ds=>ds.filter(d=>!isExpired(d)));},60000);return()=>clearInterval(t);},[]);

  // Drop pin after verification completes
  useEffect(()=>{
    if(pendingDrop&&!showVerify){
      setPendingDrop(false);
      const newDrop={id:Date.now(),name:userProfile.name,age:parseInt(userProfile.age)||25,gender:userProfile.gender,orientation:userProfile.orientation,race:userProfile.race,hair:userProfile.hair,bio:userProfile.bio,instagram:userProfile.instagram,twitter:userProfile.twitter,photo:userProfile.photo,...form,lat:form.lat||0,lng:form.lng||0,postedAt:Date.now(),color:"#f59e0b",verified:isVerified};
      setMyDrop(newDrop);setDrops(ds=>[newDrop,...ds]);setSubmitted(true);setTab("Map");
    }
  },[pendingDrop,showVerify]);

  const filteredDrops=drops.filter(d=>{if(blockedIds.includes(d.id))return false;if(isExpired(d))return false;if(filterApproachable&&!d.approachable)return false;if(filterGender!=="All"&&d.gender!==filterGender)return false;return true;});

  const getLocation=()=>{setLocating(true);setLocError("");if(!navigator.geolocation){setLocError("GPS not supported.");setLocating(false);return;}navigator.geolocation.getCurrentPosition(pos=>{setForm(f=>({...f,lat:pos.coords.latitude,lng:pos.coords.longitude}));setLocating(false);},()=>{setLocError("Couldn't get location. Please type it manually below.");setLocating(false);},{enableHighAccuracy:true,timeout:8000});};

  const submitDrop=()=>{
    if(!form.location||!form.outfit)return;
    if(!isVerified){setShowVerify(true);setPendingDrop(true);return;}
    const newDrop={id:Date.now(),name:userProfile.name,age:parseInt(userProfile.age)||25,gender:userProfile.gender,orientation:userProfile.orientation,race:userProfile.race,hair:userProfile.hair,bio:userProfile.bio,instagram:userProfile.instagram,twitter:userProfile.twitter,photo:userProfile.photo,...form,lat:form.lat||0,lng:form.lng||0,postedAt:Date.now(),color:"#f59e0b",verified:isVerified};
    setMyDrop(newDrop);setDrops(ds=>[newDrop,...ds]);setSubmitted(true);setTab("Map");
  };

  const stopSharing=()=>{
    if(myDrop)setDrops(ds=>ds.filter(d=>d.id!==myDrop.id));
    setMyDrop(null);setSubmitted(false);
    setForm({location:"",neighborhood:"City Center",outfit:"",approachable:true,vibe:"",lookingFor:"",lat:null,lng:null,expiresIn:120});
  };

  const removeDrop=()=>{stopSharing();setTab("Drop Pin");};
  const blockUser=(id)=>{setBlockedIds(b=>[...b,id]);setSelectedDrop(null);};
  const sendMessage=(id)=>{if(!sendMsg.trim())return;setMessages(m=>({...m,[id]:[...(m[id]||[]),{from:"me",text:sendMsg,time:new Date().toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"})}]}));setSendMsg("");setTimeout(()=>{const r=["Hey! Come say hi 😊","I see you 👀","Yes please! I'm right here 📍","Come say hello!","Totally, come find me!"];setMessages(m=>({...m,[id]:[...(m[id]||[]),{from:"them",text:r[Math.floor(Math.random()*r.length)],time:new Date().toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"})}]}));},1500);};

  const IS={width:"100%",background:"#0d0d1a",border:"1px solid #1e2040",borderRadius:12,padding:"11px 14px",color:"#f0ede8",fontSize:14,outline:"none",fontFamily:"inherit"};
  const LS={fontSize:11,letterSpacing:2,color:"#5a5a7a",textTransform:"uppercase",marginBottom:6,display:"block",fontFamily:"'Syne',sans-serif"};
  const TABS=[["Map","🗺️"],["Nearby","📡"],["Drop Pin","📍"],["Profile","👤"]];

  return(
    <div style={{height:"100vh",display:"flex",flexDirection:"column",background:"#080812",color:"#f0ede8"}}>
      {showVerify&&<PhoneVerifyModal
        onVerified={(ph)=>{setIsVerified(true);setShowVerify(false);}}
        onSkip={()=>{setShowVerify(false);}}
      />}
      {showReport&&selectedDrop&&<ReportModal drop={selectedDrop} onClose={()=>setShowReport(false)} onReport={(id)=>setBlockedIds(b=>[...b,id])}/>}
      {showSOS&&<SOSModal onClose={()=>setShowSOS(false)} sosContact={sosContact}/>}

      {/* Header */}
      <div style={{padding:"12px 18px 8px",flexShrink:0,background:"#080812",borderBottom:"1px solid #0e0e22",zIndex:10}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div>
            <div style={{display:"flex",alignItems:"center",gap:7,marginBottom:1}}>
              <span className="pulse-dot" style={{width:6,height:6,borderRadius:"50%",background:"#f59e0b"}}/>
              <span style={{fontSize:10,letterSpacing:3,color:"#f59e0b",textTransform:"uppercase",fontFamily:"'Syne',sans-serif"}}>Live · {filteredDrops.length} drops</span>
            </div>
            <h1 style={{fontFamily:"'Syne',sans-serif",fontSize:22,fontWeight:800,lineHeight:1.1}}>{tab==="Map"?"Who's Out?":tab==="Nearby"?"Nearby":tab==="Drop Pin"?"Drop Your Pin":"My Profile"}</h1>
          </div>
          <div style={{display:"flex",gap:8,alignItems:"center"}}>
            {myDrop&&<div style={{fontSize:10,color:"#34d399",background:"rgba(52,211,153,0.1)",border:"1px solid rgba(52,211,153,0.25)",borderRadius:20,padding:"3px 8px"}}>📍 Live</div>}
            <button onClick={()=>setShowSOS(true)} className="btn sos-btn" style={{background:"linear-gradient(135deg,#ef4444,#dc2626)",border:"none",borderRadius:20,padding:"5px 12px",color:"#fff",fontSize:11,fontWeight:700,letterSpacing:1}}>🆘 SOS</button>
          </div>
        </div>
      </div>

      <div style={{flex:1,overflow:"hidden",position:"relative"}}>

        {/* MAP */}
        {tab==="Map"&&(
          <div style={{height:"100%",position:"relative"}}>
            <MapView drops={filteredDrops} onSelectDrop={setSelectedDrop}/>
            {/* Filter pills */}
            <div style={{position:"absolute",top:10,left:10,right:10,zIndex:500,display:"flex",gap:6,flexWrap:"wrap"}}>
              <button onClick={()=>setFilterApproachable(!filterApproachable)} className="pill" style={{padding:"5px 10px",borderRadius:20,fontSize:11,background:filterApproachable?"rgba(52,211,153,0.92)":"rgba(8,8,18,0.88)",backdropFilter:"blur(8px)",border:`1px solid ${filterApproachable?"#34d399":"rgba(255,255,255,0.1)"}`,color:filterApproachable?"#000":"#ddd"}}>✓ Approachable</button>
              {["All","Man","Woman","Non-binary"].map(g=><button key={g} onClick={()=>setFilterGender(g)} className="pill" style={{padding:"5px 10px",borderRadius:20,fontSize:11,background:filterGender===g?"rgba(245,158,11,0.92)":"rgba(8,8,18,0.88)",backdropFilter:"blur(8px)",border:`1px solid ${filterGender===g?"#f59e0b":"rgba(255,255,255,0.1)"}`,color:filterGender===g?"#000":"#ddd"}}>{g}</button>)}
            </div>
            {/* Drop pin FAB */}
            <button onClick={()=>setTab("Drop Pin")} className="btn" style={{position:"absolute",bottom:20,right:16,zIndex:500,background:"linear-gradient(135deg,#f59e0b,#f97316)",border:"none",borderRadius:"50%",width:52,height:52,fontSize:22,display:"flex",alignItems:"center",justifyContent:"center",boxShadow:"0 4px 20px rgba(245,158,11,0.5)"}}>📍</button>
            {/* STOP SHARING button — only shows when pin is live */}
            {myDrop&&(
              <button onClick={stopSharing} className="btn stop-btn" style={{position:"absolute",bottom:20,left:16,zIndex:500,background:"linear-gradient(135deg,#ef4444,#dc2626)",border:"none",borderRadius:24,padding:"0 18px",height:52,color:"#fff",fontSize:13,fontWeight:700,display:"flex",alignItems:"center",gap:6,boxShadow:"0 4px 20px rgba(239,68,68,0.5)"}}>
                ⏹ Stop Sharing
              </button>
            )}
          </div>
        )}

        {/* NEARBY */}
        {tab==="Nearby"&&(
          <div className="fade-in" style={{height:"100%",overflowY:"auto",padding:"12px 18px"}}>
            <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:12}}>
              <button onClick={()=>setFilterApproachable(!filterApproachable)} className="pill" style={{padding:"5px 11px",borderRadius:20,fontSize:11,background:filterApproachable?"rgba(52,211,153,0.15)":"transparent",border:`1px solid ${filterApproachable?"#34d399":"#1e2040"}`,color:filterApproachable?"#34d399":"#5a5a7a"}}>✓ Approachable only</button>
              {["All","Man","Woman","Non-binary"].map(g=><button key={g} onClick={()=>setFilterGender(g)} className="pill" style={{padding:"5px 11px",borderRadius:20,fontSize:11,background:filterGender===g?"rgba(245,158,11,0.15)":"transparent",border:`1px solid ${filterGender===g?"#f59e0b":"#1e2040"}`,color:filterGender===g?"#f59e0b":"#5a5a7a"}}>{g}</button>)}
            </div>
            {filteredDrops.length===0?<div style={{textAlign:"center",padding:"50px 0",color:"#3a3a5a"}}><div style={{fontSize:36}}>📍</div><div style={{fontFamily:"'Syne',sans-serif",color:"#5a5a7a",marginTop:10}}>No active drops nearby</div></div>
            :<div style={{display:"flex",flexDirection:"column",gap:10}}>
              {filteredDrops.map(drop=>{
                const tl=timeLeft(drop.postedAt,drop.expiresIn);const pct=expirePct(drop.postedAt,drop.expiresIn);
                return(
                  <div key={drop.id} className="card" onClick={()=>setSelectedDrop(drop)} style={{background:"#0d0d1a",borderRadius:16,border:`1px solid ${drop.approachable?"rgba(52,211,153,0.2)":"#1e2040"}`,padding:"14px"}}>
                    <div style={{height:3,background:"#1e2040",borderRadius:4,marginBottom:10,overflow:"hidden"}}><div className="expire-bar" style={{width:`${100-pct}%`}}/></div>
                    <div style={{display:"flex",gap:12,alignItems:"flex-start"}}>
                      <div style={{position:"relative",flexShrink:0}}>
                        <div style={{width:46,height:46,borderRadius:"50%",background:`linear-gradient(135deg,${drop.color}33,${drop.color}11)`,border:`1.5px solid ${drop.color}55`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,overflow:"hidden"}}>
                          {drop.photo?<img src={drop.photo} style={{width:"100%",height:"100%",objectFit:"cover"}} alt=""/>:drop.name?drop.name[0]:"?"}
                        </div>
                        {drop.verified&&<div style={{position:"absolute",bottom:-1,right:-1,width:14,height:14,background:"#34d399",borderRadius:"50%",border:"2px solid #0d0d1a",display:"flex",alignItems:"center",justifyContent:"center",fontSize:8,color:"#000",fontWeight:700}}>✓</div>}
                      </div>
                      <div style={{flex:1,minWidth:0}}>
                        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:2}}>
                          <span style={{fontFamily:"'Syne',sans-serif",fontSize:15,fontWeight:700}}>{drop.name}, {drop.age}</span>
                          {drop.approachable?<span style={{fontSize:10,color:"#34d399",background:"rgba(52,211,153,0.12)",border:"1px solid rgba(52,211,153,0.25)",borderRadius:10,padding:"2px 7px"}}>Come say hi</span>:<span style={{fontSize:10,color:"#5a5a7a",background:"#12122a",border:"1px solid #1e2040",borderRadius:10,padding:"2px 7px"}}>Not right now</span>}
                        </div>
                        <div style={{fontSize:11,color:"#5a5a7a",marginBottom:4}}>📍 {drop.location} {tl&&<span style={{color:"#f59e0b"}}>· ⏰ {tl}</span>}</div>
                        <div style={{display:"flex",gap:5,flexWrap:"wrap",marginBottom:3}}>
                          {drop.race&&<span style={{fontSize:10,background:"#12122a",border:"1px solid #1e2040",borderRadius:10,padding:"2px 7px",color:"#a0a0c0"}}>{drop.race}</span>}
                          {drop.hair&&<span style={{fontSize:10,background:"#12122a",border:"1px solid #1e2040",borderRadius:10,padding:"2px 7px",color:"#a0a0c0"}}>✂ {drop.hair}</span>}
                        </div>
                        {drop.outfit&&<div style={{fontSize:11,color:"#7070a0",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>👕 {drop.outfit}</div>}
                      </div>
                    </div>
                  </div>
                );
              })}
            </div>}
          </div>
        )}

        {/* DROP PIN */}
        {tab==="Drop Pin"&&(
          <div className="fade-in" style={{height:"100%",overflowY:"auto",padding:"12px 18px 30px"}}>
            {submitted?(
              <div style={{textAlign:"center",padding:"40px 20px"}}>
                <div style={{fontSize:52,marginBottom:10}}>📍</div>
                <div style={{fontFamily:"'Syne',sans-serif",fontSize:24,fontWeight:800,marginBottom:4}}>You're Live!</div>
                <div style={{fontSize:13,color:"#7070a0",marginBottom:4}}>Pin expires in {EXPIRE_OPTIONS.find(e=>e.value===form.expiresIn)?.label}.</div>
                {isVerified&&<div style={{fontSize:12,color:"#34d399",marginBottom:20}}>✓ Verified profile</div>}
                <div style={{display:"flex",gap:10,justifyContent:"center",flexWrap:"wrap"}}>
                  <button onClick={()=>setTab("Map")} className="btn" style={{background:"linear-gradient(135deg,#f59e0b,#f97316)",border:"none",borderRadius:14,padding:"13px 28px",color:"#fff",fontSize:15,fontWeight:600}}>See Me on Map 🗺️</button>
                  <button onClick={stopSharing} className="btn" style={{background:"linear-gradient(135deg,#ef4444,#dc2626)",border:"none",borderRadius:14,padding:"13px 28px",color:"#fff",fontSize:15,fontWeight:600}}>⏹ Stop Sharing</button>
                </div>
              </div>
            ):(
              <div>
                <div style={{background:"rgba(245,158,11,0.06)",border:"1px solid rgba(245,158,11,0.2)",borderRadius:14,padding:"12px 14px",marginBottom:16,display:"flex",gap:12,alignItems:"center"}}>
                  <div style={{width:44,height:44,borderRadius:"50%",background:"rgba(245,158,11,0.2)",border:"2px solid #f59e0b",display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,overflow:"hidden",flexShrink:0}}>
                    {userProfile.photo?<img src={userProfile.photo} style={{width:"100%",height:"100%",objectFit:"cover"}} alt=""/>:userProfile.name?userProfile.name[0]:"😎"}
                  </div>
                  <div style={{flex:1}}>
                    <div style={{fontFamily:"'Syne',sans-serif",fontSize:14,fontWeight:700}}>{userProfile.name}, {userProfile.age}</div>
                    <div style={{fontSize:11,color:"#7070a0"}}>{userProfile.race&&userProfile.race+' · '}{userProfile.gender}{userProfile.hair&&' · ✂ '+userProfile.hair}</div>
                  </div>
                  <button onClick={onEditProfile} style={{background:"none",border:"1px solid #1e2040",borderRadius:10,padding:"5px 10px",color:"#5a5a7a",fontSize:11,cursor:"pointer",fontFamily:"inherit"}}>Edit</button>
                </div>
                {!isVerified&&<div style={{background:"rgba(52,211,153,0.07)",border:"1px solid rgba(52,211,153,0.2)",borderRadius:12,padding:"10px 14px",marginBottom:14,display:"flex",justifyContent:"space-between",alignItems:"center"}}><div><div style={{fontSize:12,color:"#34d399",fontWeight:600}}>🛡️ Verify your phone</div><div style={{fontSize:11,color:"#5a5a7a"}}>Get a ✓ badge and more trust</div></div><button onClick={()=>setShowVerify(true)} className="btn" style={{background:"rgba(52,211,153,0.15)",border:"1px solid rgba(52,211,153,0.3)",borderRadius:10,padding:"6px 12px",color:"#34d399",fontSize:12}}>Verify</button></div>}
                <div style={{display:"flex",flexDirection:"column",gap:13}}>
                  <button onClick={getLocation} className="btn" style={{background:form.lat?"rgba(52,211,153,0.15)":"rgba(245,158,11,0.1)",border:`1px solid ${form.lat?"#34d399":"rgba(245,158,11,0.4)"}`,borderRadius:14,padding:"13px",color:form.lat?"#34d399":"#f59e0b",fontSize:14,fontWeight:600,display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>
                    {locating?"📡 Getting location…":form.lat?"✓ GPS Captured!":"📡 Use My GPS Location"}
                  </button>
                  {locError&&<div style={{fontSize:12,color:"#ef4444",background:"rgba(239,68,68,0.1)",borderRadius:10,padding:"8px 12px"}}>{locError}</div>}
                  <div style={{textAlign:"center",fontSize:12,color:"#3a3a5a"}}>— or type manually —</div>
                  <div><label style={LS}>Neighborhood</label><select value={form.neighborhood} onChange={e=>setForm(f=>({...f,neighborhood:e.target.value}))} style={IS}>{NEIGHBORHOOD_OPTIONS.map(n=><option key={n} value={n}>{n}</option>)}</select></div>
                  <div><label style={LS}>Specific Spot</label><input value={form.location} onChange={e=>setForm(f=>({...f,location:e.target.value}))} placeholder="e.g. Outside the coffee shop on Main St" style={IS}/></div>
                  <div><label style={LS}>What are you wearing?</label><textarea value={form.outfit} onChange={e=>setForm(f=>({...f,outfit:e.target.value}))} rows={2} placeholder="e.g. Red hoodie, black joggers, white AF1s" style={{...IS,resize:"none"}}/></div>
                  <div>
                    <label style={LS}>Approachable right now?</label>
                    <div style={{display:"flex",gap:10}}>
                      <button onClick={()=>setForm(f=>({...f,approachable:true}))} className="pill" style={{flex:1,padding:"11px",borderRadius:14,fontSize:13,border:`1.5px solid ${form.approachable?"#34d399":"#1e2040"}`,background:form.approachable?"rgba(52,211,153,0.12)":"transparent",color:form.approachable?"#34d399":"#5a5a7a"}}>✓ Yes, come say hi!</button>
                      <button onClick={()=>setForm(f=>({...f,approachable:false}))} className="pill" style={{flex:1,padding:"11px",borderRadius:14,fontSize:13,border:`1.5px solid ${!form.approachable?"#f472b6":"#1e2040"}`,background:!form.approachable?"rgba(244,114,182,0.1)":"transparent",color:!form.approachable?"#f472b6":"#5a5a7a"}}>Not right now</button>
                    </div>
                  </div>
                  <div><label style={LS}>Your vibe right now</label><textarea value={form.vibe} onChange={e=>setForm(f=>({...f,vibe:e.target.value}))} rows={2} placeholder="e.g. Chilling after work, open to meeting people" style={{...IS,resize:"none"}}/></div>
                  <div><label style={LS}>Who are you looking for?</label><textarea value={form.lookingFor} onChange={e=>setForm(f=>({...f,lookingFor:e.target.value}))} rows={2} placeholder="Describe who you'd love to meet…" style={{...IS,resize:"none"}}/></div>
                  <div>
                    <label style={LS}>⏰ How long should your pin stay live?</label>
                    <div style={{display:"flex",gap:8}}>
                      {EXPIRE_OPTIONS.map(e=><button key={e.value} onClick={()=>setForm(f=>({...f,expiresIn:e.value}))} className="pill" style={{flex:1,padding:"9px 4px",borderRadius:12,fontSize:12,border:`1px solid ${form.expiresIn===e.value?"#f59e0b":"#1e2040"}`,background:form.expiresIn===e.value?"rgba(245,158,11,0.15)":"transparent",color:form.expiresIn===e.value?"#f59e0b":"#5a5a7a"}}>{e.label}</button>)}
                    </div>
                  </div>
                  <button onClick={submitDrop} className="btn" style={{background:form.location&&form.outfit?"linear-gradient(135deg,#f59e0b,#f97316)":"#1e2040",border:"none",borderRadius:14,padding:"13px",color:form.location&&form.outfit?"#fff":"#3a3a5a",fontSize:15,fontWeight:700}}>📍 Drop My Pin</button>
                </div>
              </div>
            )}
          </div>
        )}

        {/* PROFILE TAB */}
        {tab==="Profile"&&(
          <div className="fade-in" style={{height:"100%",overflowY:"auto",padding:"16px 18px 30px"}}>
            {/* SOS Contact */}
            <div style={{background:"rgba(239,68,68,0.07)",border:"1px solid rgba(239,68,68,0.2)",borderRadius:14,padding:"12px 14px",marginBottom:14}}>
              <div style={{fontSize:13,color:"#ef4444",fontWeight:600,marginBottom:4}}>🆘 Safety Contact</div>
              <div style={{fontSize:12,color:"#7070a0",marginBottom:8}}>If you tap SOS, we'll text this person immediately.</div>
              {sosContact
                ?<div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}><span style={{fontSize:13,color:"#34d399"}}>✓ {sosContact}</span><button onClick={()=>{setSosContact("");store.set('sos_contact',"");}} style={{background:"none",border:"none",color:"#ef4444",fontSize:12,cursor:"pointer",fontFamily:"inherit"}}>Remove</button></div>
                :<div style={{display:"flex",gap:8}}><input value={sosInput} onChange={e=>setSosInput(e.target.value)} placeholder="Enter phone number" style={{...IS,flex:1,padding:"9px 12px",fontSize:13}}/><button onClick={()=>{if(sosInput.trim()){setSosContact(sosInput.trim());store.set('sos_contact',sosInput.trim());setSosInput("");}}} className="btn" style={{background:"rgba(239,68,68,0.2)",border:"1px solid rgba(239,68,68,0.3)",borderRadius:12,padding:"9px 14px",color:"#ef4444",fontSize:13}}>Save</button></div>
              }
            </div>
            {/* Profile card */}
            <div style={{background:"#0d0d1a",border:"1px solid rgba(245,158,11,0.25)",borderRadius:20,padding:"20px",marginBottom:14}}>
              <div style={{display:"flex",gap:16,alignItems:"center",marginBottom:14}}>
                <div style={{width:72,height:72,borderRadius:"50%",border:"3px solid #f59e0b",background:"rgba(245,158,11,0.1)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:32,overflow:"hidden",flexShrink:0}}>
                  {userProfile.photo?<img src={userProfile.photo} style={{width:"100%",height:"100%",objectFit:"cover"}} alt=""/>:userProfile.name?userProfile.name[0]:"😎"}
                </div>
                <div style={{flex:1}}>
                  <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:3}}>
                    <div style={{fontFamily:"'Syne',sans-serif",fontSize:22,fontWeight:800}}>{userProfile.name}, {userProfile.age}</div>
                    {isVerified&&<span className="verified-badge">✓ Verified</span>}
                  </div>
                  <div style={{fontSize:12,color:"#7070a0"}}>{userProfile.gender} · {userProfile.orientation}</div>
                </div>
              </div>
              <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:10}}>
                {userProfile.race&&<span style={{fontSize:11,background:"#12122a",border:"1px solid #1e2040",borderRadius:10,padding:"3px 9px",color:"#a0a0c0"}}>{userProfile.race}</span>}
                {userProfile.hair&&<span style={{fontSize:11,background:"#12122a",border:"1px solid #1e2040",borderRadius:10,padding:"3px 9px",color:"#a0a0c0"}}>✂ {userProfile.hair}</span>}
              </div>
              {userProfile.bio&&<div style={{fontSize:13,color:"#c0c0e0",lineHeight:1.6,marginBottom:10,fontStyle:"italic"}}>"{userProfile.bio}"</div>}
              {(userProfile.instagram&&userProfile.instagram!=="@"||userProfile.twitter&&userProfile.twitter!=="@")&&(
                <div style={{display:"flex",gap:10,marginBottom:12}}>
                  {userProfile.instagram&&userProfile.instagram!=="@"&&<span style={{fontSize:12,color:"#f472b6"}}>📸 {userProfile.instagram}</span>}
                  {userProfile.twitter&&userProfile.twitter!=="@"&&<span style={{fontSize:12,color:"#38bdf8"}}>𝕏 {userProfile.twitter}</span>}
                </div>
              )}
              <button onClick={onEditProfile} className="btn" style={{width:"100%",background:"rgba(245,158,11,0.1)",border:"1px solid rgba(245,158,11,0.3)",borderRadius:12,padding:"11px",color:"#f59e0b",fontSize:13,fontWeight:600}}>✏️ Edit Profile</button>
            </div>
            {/* Active drop card */}
            {myDrop&&(
              <div style={{background:"#0d0d1a",border:"1px solid rgba(52,211,153,0.3)",borderRadius:16,padding:"14px",marginBottom:14}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
                  <div style={{display:"flex",alignItems:"center",gap:7}}>
                    <span className="pulse-dot" style={{width:6,height:6,borderRadius:"50%",background:"#f59e0b"}}/>
                    <span style={{fontSize:11,letterSpacing:2,color:"#f59e0b",textTransform:"uppercase",fontFamily:"'Syne',sans-serif"}}>Pin Live</span>
                  </div>
                  <span style={{fontSize:11,color:"#f59e0b"}}>⏰ {timeLeft(myDrop.postedAt,myDrop.expiresIn)||"Expiring"}</span>
                </div>
                <div style={{height:3,background:"#1e2040",borderRadius:4,marginBottom:10,overflow:"hidden"}}><div className="expire-bar" style={{width:`${100-expirePct(myDrop.postedAt,myDrop.expiresIn)}%`}}/></div>
                <div style={{fontSize:13,color:"#c0c0e0",marginBottom:4}}>📍 {myDrop.location}</div>
                <div style={{fontSize:12,color:"#7070a0",marginBottom:10}}>👕 {myDrop.outfit}</div>
                <div style={{display:"flex",gap:8}}>
                  <button onClick={()=>setTab("Map")} className="btn" style={{flex:1,background:"rgba(245,158,11,0.1)",border:"1px solid rgba(245,158,11,0.3)",borderRadius:12,padding:"9px",color:"#f59e0b",fontSize:13}}>See on Map</button>
                  <button onClick={stopSharing} className="btn" style={{flex:1,background:"linear-gradient(135deg,#ef4444,#dc2626)",border:"none",borderRadius:12,padding:"9px",color:"#fff",fontSize:13,fontWeight:600}}>⏹ Stop Sharing</button>
                </div>
              </div>
            )}
          </div>
        )}
      </div>

      {/* Profile detail modal */}
      {selectedDrop&&!showReport&&(
        <div className="modal-bg" onClick={()=>setSelectedDrop(null)} style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.88)",zIndex:1000,display:"flex",alignItems:"flex-end",justifyContent:"center"}}>
          <div className="modal-panel" onClick={e=>e.stopPropagation()} style={{background:"#0d0d1a",borderRadius:"24px 24px 0 0",border:"1px solid rgba(245,158,11,0.2)",borderBottom:"none",padding:"22px 20px 34px",width:"100%",maxWidth:500,maxHeight:"88vh",overflowY:"auto"}}>
            <div style={{width:36,height:4,background:"#1e2040",borderRadius:2,margin:"0 auto 14px"}}/>
            <div style={{display:"flex",justifyContent:"flex-end",gap:8,marginBottom:12}}>
              <button onClick={()=>setShowReport(true)} style={{background:"rgba(245,158,11,0.1)",border:"1px solid rgba(245,158,11,0.2)",borderRadius:10,padding:"5px 12px",color:"#f59e0b",fontSize:11,cursor:"pointer",fontFamily:"inherit"}}>⚠ Report</button>
              <button onClick={()=>blockUser(selectedDrop.id)} style={{background:"rgba(239,68,68,0.1)",border:"1px solid rgba(239,68,68,0.2)",borderRadius:10,padding:"5px 12px",color:"#ef4444",fontSize:11,cursor:"pointer",fontFamily:"inherit"}}>🚫 Block</button>
            </div>
            <div style={{display:"flex",gap:14,alignItems:"center",marginBottom:14}}>
              <div style={{width:64,height:64,borderRadius:"50%",flexShrink:0,background:`linear-gradient(135deg,${selectedDrop.color}44,${selectedDrop.color}11)`,border:`2px solid ${selectedDrop.color}66`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:28,overflow:"hidden"}}>
                {selectedDrop.photo?<img src={selectedDrop.photo} style={{width:"100%",height:"100%",objectFit:"cover"}} alt=""/>:selectedDrop.name?selectedDrop.name[0]:"?"}
              </div>
              <div>
                <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:2}}>
                  <div style={{fontFamily:"'Syne',sans-serif",fontSize:20,fontWeight:800}}>{selectedDrop.name}, {selectedDrop.age}</div>
                  {selectedDrop.verified&&<span className="verified-badge">✓ Verified</span>}
                </div>
                <div style={{fontSize:12,color:"#5a5a7a"}}>📍 {selectedDrop.location}</div>
                <div style={{fontSize:11,color:selectedDrop.color,marginTop:1}}>⏰ {timeLeft(selectedDrop.postedAt,selectedDrop.expiresIn)||"Expiring soon"}</div>
              </div>
            </div>
            {selectedDrop.bio&&<div style={{background:"#12122a",borderRadius:12,padding:"10px 13px",marginBottom:10}}><div style={{fontSize:10,color:"#3a3a5a",letterSpacing:1.5,textTransform:"uppercase",marginBottom:3,fontFamily:"'Syne',sans-serif"}}>Bio</div><div style={{fontSize:13,color:"#c0c0e0",lineHeight:1.6,fontStyle:"italic"}}>"{selectedDrop.bio}"</div></div>}
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:10}}>
              {[["Race",selectedDrop.race],["Gender",selectedDrop.gender],["Hair",selectedDrop.hair],["Orientation",selectedDrop.orientation],["Wearing",selectedDrop.outfit]].filter(([,v])=>v).map(([label,val])=>(
                <div key={label} style={{background:"#12122a",borderRadius:12,padding:"10px 12px"}}>
                  <div style={{fontSize:10,color:"#3a3a5a",letterSpacing:1.5,textTransform:"uppercase",marginBottom:3,fontFamily:"'Syne',sans-serif"}}>{label}</div>
                  <div style={{fontSize:12,color:"#c0c0e0",lineHeight:1.4}}>{val}</div>
                </div>
              ))}
            </div>
            {(selectedDrop.instagram&&selectedDrop.instagram!=="@"||selectedDrop.twitter&&selectedDrop.twitter!=="@")&&(
              <div style={{background:"#12122a",borderRadius:12,padding:"10px 13px",marginBottom:10}}>
                <div style={{fontSize:10,color:"#3a3a5a",letterSpacing:1.5,textTransform:"uppercase",marginBottom:6,fontFamily:"'Syne',sans-serif"}}>Social</div>
                <div style={{display:"flex",gap:12}}>
                  {selectedDrop.instagram&&selectedDrop.instagram!=="@"&&<span style={{fontSize:13,color:"#f472b6"}}>📸 {selectedDrop.instagram}</span>}
                  {selectedDrop.twitter&&selectedDrop.twitter!=="@"&&<span style={{fontSize:13,color:"#38bdf8"}}>𝕏 {selectedDrop.twitter}</span>}
                </div>
              </div>
            )}
            <div style={{textAlign:"center",marginBottom:14}}>
              <span style={{fontSize:13,fontWeight:600,color:selectedDrop.approachable?"#34d399":"#f472b6",background:selectedDrop.approachable?"rgba(52,211,153,0.1)":"rgba(244,114,182,0.1)",border:`1.5px solid ${selectedDrop.approachable?"rgba(52,211,153,0.3)":"rgba(244,114,182,0.3)"}`,borderRadius:24,padding:"7px 18px",display:"inline-block"}}>{selectedDrop.approachable?"✓ Come say hi!":"Not right now"}</span>
            </div>
            {selectedDrop.vibe&&<div style={{background:"#12122a",borderRadius:12,padding:"10px 13px",marginBottom:10}}><div style={{fontSize:10,color:"#3a3a5a",letterSpacing:1.5,textTransform:"uppercase",marginBottom:3,fontFamily:"'Syne',sans-serif"}}>Their Vibe</div><div style={{fontSize:13,color:"#c0c0e0",lineHeight:1.6,fontStyle:"italic"}}>"{selectedDrop.vibe}"</div></div>}
            {selectedDrop.lookingFor&&<div style={{background:"rgba(245,158,11,0.07)",border:`1px solid ${selectedDrop.color}33`,borderRadius:12,padding:"10px 13px",marginBottom:14}}><div style={{fontSize:10,color:selectedDrop.color,letterSpacing:1.5,textTransform:"uppercase",marginBottom:3,fontFamily:"'Syne',sans-serif"}}>Looking For</div><div style={{fontSize:13,color:"#c0c0e0",lineHeight:1.6}}>{selectedDrop.lookingFor}</div></div>}
            {selectedDrop.approachable&&(
              <div>
                <div style={{fontSize:11,color:"#3a3a5a",letterSpacing:2,textTransform:"uppercase",marginBottom:7,fontFamily:"'Syne',sans-serif"}}>Send a Message</div>
                <div style={{background:"#12122a",borderRadius:14,padding:10,marginBottom:8,minHeight:56,maxHeight:130,overflowY:"auto"}}>
                  {(messages[selectedDrop.id]||[]).length===0?<div style={{color:"#2a2a4a",fontSize:13,textAlign:"center",paddingTop:8}}>Break the ice 👋</div>:(messages[selectedDrop.id]||[]).map((m,i)=>(
                    <div key={i} style={{display:"flex",justifyContent:m.from==="me"?"flex-end":"flex-start",marginBottom:6}}>
                      <div style={{background:m.from==="me"?"linear-gradient(135deg,#f59e0b,#f97316)":"#1e2040",borderRadius:14,padding:"7px 11px",maxWidth:"75%",fontSize:13,color:"#fff"}}>{m.text}<div style={{fontSize:9,opacity:0.6,marginTop:2}}>{m.time}</div></div>
                    </div>
                  ))}
                </div>
                <div style={{display:"flex",gap:8}}>
                  <input value={sendMsg} onChange={e=>setSendMsg(e.target.value)} onKeyDown={e=>e.key==="Enter"&&sendMessage(selectedDrop.id)} placeholder="Say something…" style={{...IS,flex:1,padding:"10px 13px"}}/>
                  <button onClick={()=>sendMessage(selectedDrop.id)} className="btn" style={{background:"linear-gradient(135deg,#f59e0b,#f97316)",border:"none",borderRadius:12,padding:"10px 15px",color:"#fff",fontSize:16}}>↑</button>
                </div>
              </div>
            )}
          </div>
        </div>
      )}

      {/* Bottom Nav */}
      <div style={{flexShrink:0,background:"rgba(8,8,18,0.97)",backdropFilter:"blur(20px)",borderTop:"1px solid rgba(245,158,11,0.1)",padding:"8px 0 14px",zIndex:100}}>
        <div style={{display:"flex",justifyContent:"space-around",maxWidth:500,margin:"0 auto"}}>
          {TABS.map(([t,icon])=>(
            <button key={t} onClick={()=>setTab(t)} className="tab-item" style={{display:"flex",flexDirection:"column",alignItems:"center",gap:3,padding:"4px 14px",color:tab===t?"#f59e0b":"#3a3a5a"}}>
              <span style={{fontSize:18,filter:tab===t?"drop-shadow(0 0 8px rgba(245,158,11,0.9))":"none",transition:"filter 0.2s"}}>{icon}</span>
              <span style={{fontSize:9,letterSpacing:1,textTransform:"uppercase",fontFamily:"'Syne',sans-serif",fontWeight:tab===t?700:400}}>{t}</span>
            </button>
          ))}
        </div>
      </div>
    </div>
  );
}

function Root(){
  const [screen,setScreen]=useState(()=>{
    const consent=store.get('dp_consent');
    const profile=store.get('dp_profile');
    if(!consent)return 'disclaimer';
    if(!profile)return 'profile_setup';
    return 'app';
  });
  const [userProfile,setUserProfile]=useState(()=>store.get('dp_profile')||null);
  const onConsentAccept=()=>{store.set('dp_consent',true);setScreen('profile_setup');};
  const onProfileComplete=(p)=>{store.set('dp_profile',p);setUserProfile(p);setScreen('app');};
  const onEditProfile=()=>setScreen('profile_setup');
  if(screen==='disclaimer')return <DisclaimerScreen onAccept={onConsentAccept}/>;
  if(screen==='profile_setup')return <ProfileSetup onComplete={onProfileComplete} existing={userProfile}/>;
  return <App userProfile={userProfile} onEditProfile={onEditProfile}/>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<Root/>);
</script>
</body>
</html>
